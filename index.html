<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Hamna Khalid — A Special Birthday Journey</title>
  <meta name="description" content="A magical, cinematic birthday experience created just for Hamna Khalid." />
  <meta name="robots" content="noindex" />

  <!-- ═══════════════════════════════════════════════════════════
       GOOGLE FONTS — Cinematic & Elegant Typography
  ═══════════════════════════════════════════════════════════ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:wght@200;300;400;500;600&family=Dancing+Script:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

  <!-- ═══════════════════════════════════════════════════════════
       CDN LIBRARIES
  ═══════════════════════════════════════════════════════════ -->
  <!-- GSAP Core + Plugins -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/TextPlugin.min.js"></script>
  <!-- Canvas Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <!-- Typed.js -->
  <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
  <!-- Anime.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>

  <style>
    /* ═══════════════════════════════════════════════════════════
       CSS RESET & BASE
    ═══════════════════════════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Color Palette */
      --black:         #000000;
      --deep-black:    #050508;
      --midnight:      #080c1a;
      --midnight-blue: #0a0e2a;
      --navy:          #0d1340;
      --purple-deep:   #1a0a2e;
      --purple-mid:    #2d0f5a;
      --purple-aurora: #6b21a8;
      --purple-light:  #a855f7;
      --purple-glow:   #c084fc;
      --indigo:        #4338ca;
      --blue-aurora:   #1e40af;
      --gold:          #d4a017;
      --gold-bright:   #f5c842;
      --gold-pale:     #fde68a;
      --gold-shimmer:  #ffe57a;
      --white:         #ffffff;
      --white-glow:    rgba(255,255,255,0.95);
      --white-soft:    rgba(255,255,255,0.75);
      --white-ghost:   rgba(255,255,255,0.15);
      --glass-bg:      rgba(255,255,255,0.04);
      --glass-border:  rgba(255,255,255,0.12);
      --glass-shine:   rgba(255,255,255,0.08);

      /* Typography */
      --font-serif:    'Cormorant Garamond', Georgia, serif;
      --font-display:  'Playfair Display', Georgia, serif;
      --font-sans:     'Raleway', sans-serif;
      --font-script:   'Dancing Script', cursive;
      --font-garamond: 'EB Garamond', Georgia, serif;

      /* Spacing */
      --section-pad: clamp(40px, 8vh, 80px);
    }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background: var(--deep-black);
      color: var(--white);
      font-family: var(--font-serif);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      cursor: none;
    }

    /* ═══════════════════════════════════════════════════════════
       CUSTOM CURSOR
    ═══════════════════════════════════════════════════════════ */
    #cursor {
      position: fixed;
      width: 12px;
      height: 12px;
      background: var(--gold-bright);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, width 0.3s ease, height 0.3s ease, opacity 0.3s ease;
      mix-blend-mode: screen;
      box-shadow: 0 0 20px var(--gold-bright), 0 0 40px rgba(245,200,66,0.4);
    }

    #cursor-trail {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(245,200,66,0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99998;
      transform: translate(-50%, -50%);
      transition: transform 0.25s ease, left 0.25s ease, top 0.25s ease;
      backdrop-filter: blur(1px);
    }

    /* ═══════════════════════════════════════════════════════════
       MOUSE GLOW HALO
    ═══════════════════════════════════════════════════════════ */
    #mouse-glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(107,33,168,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: left 0.8s ease, top 0.8s ease;
    }

    /* ═══════════════════════════════════════════════════════════
       SCENES — BASE LAYER
    ═══════════════════════════════════════════════════════════ */
    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s linear;
      z-index: 1;
    }

    .scene.active {
      opacity: 1;
      pointer-events: all;
      z-index: 10;
    }

    /* ═══════════════════════════════════════════════════════════
       SCENE 1 — LOADING SCREEN
    ═══════════════════════════════════════════════════════════ */
    #scene-loading {
      background: var(--deep-black);
      z-index: 1000;
      pointer-events: all;
    }

    #scene-loading.active { opacity: 1; }

    .loading-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .loading-orb {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%,
        rgba(212,160,23,0.9) 0%,
        rgba(107,33,168,0.7) 40%,
        rgba(10,14,42,0.9) 100%);
      box-shadow:
        0 0 30px rgba(212,160,23,0.5),
        0 0 80px rgba(107,33,168,0.4),
        0 0 120px rgba(107,33,168,0.2);
      animation: orbPulse 2.5s ease-in-out infinite;
    }

    @keyframes orbPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(212,160,23,0.5), 0 0 80px rgba(107,33,168,0.4), 0 0 120px rgba(107,33,168,0.2); }
      50% { transform: scale(1.1); box-shadow: 0 0 50px rgba(212,160,23,0.7), 0 0 120px rgba(107,33,168,0.6), 0 0 180px rgba(107,33,168,0.3); }
    }

    .loading-text {
      font-family: var(--font-sans);
      font-size: clamp(13px, 2vw, 16px);
      font-weight: 300;
      letter-spacing: 0.35em;
      color: var(--white-soft);
      text-transform: uppercase;
      animation: textFade 1.5s ease-in-out infinite alternate;
    }

    @keyframes textFade {
      from { opacity: 0.4; }
      to   { opacity: 1; }
    }

    .loading-bar-wrap {
      width: clamp(180px, 40vw, 280px);
      height: 1px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--purple-aurora), var(--gold), var(--purple-aurora));
      background-size: 200% 100%;
      border-radius: 2px;
      animation: shimmer 1.5s linear infinite;
      transition: width 0.1s linear;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .loading-percent {
      font-family: var(--font-sans);
      font-size: 12px;
      letter-spacing: 0.2em;
      color: rgba(212,160,23,0.7);
      min-width: 40px;
      text-align: center;
    }

    .loading-particles-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* ═══════════════════════════════════════════════════════════
       SCENE 2 — THE SECRET DOOR
    ═══════════════════════════════════════════════════════════ */
    #scene-door {
      background: radial-gradient(ellipse at center,
        #0d0521 0%,
        #050210 60%,
        #000000 100%);
    }

    .door-scene-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .door-ambient {
      position: absolute;
      bottom: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(107,33,168,0.25) 0%, transparent 70%);
      border-radius: 50%;
      animation: ambientPulse 4s ease-in-out infinite;
    }

    @keyframes ambientPulse {
      0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.6; }
      50% { transform: translateX(-50%) scale(1.15); opacity: 1; }
    }

    .door-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 50px;
    }

    .door-tagline {
      font-family: var(--font-serif);
      font-size: clamp(14px, 2.5vw, 20px);
      font-weight: 300;
      font-style: italic;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.15em;
      text-align: center;
    }

    .door-wrap {
      position: relative;
      width: clamp(120px, 20vw, 160px);
      height: clamp(200px, 33vw, 260px);
      cursor: pointer;
    }

    .door-frame {
      position: absolute;
      inset: 0;
      border: 1.5px solid rgba(212,160,23,0.5);
      border-radius: 50% 50% 0 0 / 20% 20% 0 0;
      box-shadow:
        0 0 20px rgba(212,160,23,0.2),
        inset 0 0 20px rgba(107,33,168,0.1);
    }

    .door-glow-ring {
      position: absolute;
      inset: -12px;
      border-radius: 50% 50% 0 0 / 20% 20% 0 0;
      border: 1px solid rgba(212,160,23,0.15);
      animation: ringPulse 3s ease-in-out infinite;
    }

    .door-glow-ring:nth-child(2) {
      inset: -24px;
      animation-delay: 0.5s;
      border-color: rgba(107,33,168,0.12);
    }

    @keyframes ringPulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.02); }
    }

    .door-surface {
      position: absolute;
      inset: 2px;
      border-radius: 50% 50% 0 0 / 20% 20% 0 0;
      background: linear-gradient(170deg,
        rgba(30,15,60,0.9) 0%,
        rgba(15,8,30,0.95) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: all 0.4s ease;
    }

    .door-wrap:hover .door-surface {
      background: linear-gradient(170deg,
        rgba(50,20,90,0.95) 0%,
        rgba(25,10,50,0.98) 100%);
    }

    .door-keyhole {
      width: 14px;
      height: 22px;
      border-radius: 50% 50% 0 0;
      background: rgba(212,160,23,0.3);
      position: relative;
      margin-bottom: -6px;
      transition: background 0.4s ease;
    }

    .door-keyhole::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 8px;
      background: rgba(212,160,23,0.3);
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    }

    .door-wrap:hover .door-keyhole {
      background: rgba(212,160,23,0.7);
      box-shadow: 0 0 15px rgba(212,160,23,0.5);
    }

    /* Door light leak from inside */
    .door-inner-light {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(212,160,23,0.06) 0%, transparent 70%);
      border-radius: inherit;
      animation: innerGlow 3s ease-in-out infinite;
    }

    @keyframes innerGlow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* Ornamental door panels */
    .door-panel {
      position: absolute;
      border: 1px solid rgba(212,160,23,0.2);
    }

    .door-panel-top {
      top: 20%;
      left: 15%;
      right: 15%;
      height: 30%;
      border-radius: 3px;
    }

    .door-panel-bottom {
      top: 57%;
      left: 15%;
      right: 15%;
      bottom: 8%;
      border-radius: 3px;
    }

    .door-step {
      position: absolute;
      bottom: -8px;
      left: -20px;
      right: -20px;
      height: 8px;
      background: linear-gradient(90deg,
        transparent,
        rgba(212,160,23,0.3) 20%,
        rgba(212,160,23,0.5) 50%,
        rgba(212,160,23,0.3) 80%,
        transparent);
      border-radius: 0 0 4px 4px;
    }

    .door-btn {
      font-family: var(--font-sans);
      font-size: clamp(11px, 1.8vw, 14px);
      font-weight: 400;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(212,160,23,0.8);
      border: 1px solid rgba(212,160,23,0.3);
      background: rgba(212,160,23,0.04);
      padding: 14px 40px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .door-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(212,160,23,0.1), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }

    .door-btn:hover {
      color: var(--gold-bright);
      border-color: rgba(212,160,23,0.7);
      box-shadow: 0 0 30px rgba(212,160,23,0.2), inset 0 0 20px rgba(212,160,23,0.05);
    }

    .door-btn:hover::before {
      transform: translateX(100%);
    }

    /* ═══════════════════════════════════════════════════════════
       SCENE 3 — GALAXY
    ═══════════════════════════════════════════════════════════ */
    #scene-galaxy {
      background: #000;
      overflow: hidden;
    }

    #galaxy-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Aurora background bands */
    .aurora-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .aurora-band {
      position: absolute;
      width: 150%;
      left: -25%;
      height: 200px;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0;
      animation: auroraFlow 12s ease-in-out infinite;
    }

    .aurora-band:nth-child(1) {
      top: 10%;
      background: linear-gradient(90deg, transparent, rgba(107,33,168,0.35), rgba(30,64,175,0.25), transparent);
      animation-delay: 0s;
    }

    .aurora-band:nth-child(2) {
      top: 20%;
      background: linear-gradient(90deg, transparent, rgba(168,85,247,0.2), rgba(107,33,168,0.3), transparent);
      animation-delay: 3s;
    }

    .aurora-band:nth-child(3) {
      top: 30%;
      background: linear-gradient(90deg, transparent, rgba(30,64,175,0.2), rgba(168,85,247,0.25), transparent);
      animation-delay: 6s;
    }

    @keyframes auroraFlow {
      0%   { opacity: 0; transform: translateX(-5%) scaleY(0.8); }
      25%  { opacity: 1; }
      75%  { opacity: 0.7; }
      100% { opacity: 0; transform: translateX(5%) scaleY(1.2); }
    }

    /* Moon */
    .galaxy-moon {
      position: absolute;
      top: clamp(30px, 8vh, 70px);
      right: clamp(30px, 8vw, 100px);
      width: clamp(50px, 8vw, 90px);
      height: clamp(50px, 8vw, 90px);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%,
        rgba(255,240,200,0.95) 0%,
        rgba(255,220,150,0.85) 40%,
        rgba(200,170,100,0.7) 100%);
      box-shadow:
        0 0 30px rgba(255,230,150,0.4),
        0 0 80px rgba(255,200,80,0.2),
        0 0 150px rgba(212,160,23,0.1);
      animation: moonGlow 6s ease-in-out infinite;
    }

    @keyframes moonGlow {
      0%, 100% { box-shadow: 0 0 30px rgba(255,230,150,0.4), 0 0 80px rgba(255,200,80,0.2), 0 0 150px rgba(212,160,23,0.1); }
      50% { box-shadow: 0 0 50px rgba(255,230,150,0.6), 0 0 120px rgba(255,200,80,0.35), 0 0 200px rgba(212,160,23,0.15); }
    }

    .moon-crater {
      position: absolute;
      border-radius: 50%;
      background: rgba(180,140,80,0.2);
    }

    .moon-crater:nth-child(1) { width: 22%; height: 22%; top: 20%; left: 55%; }
    .moon-crater:nth-child(2) { width: 14%; height: 14%; top: 55%; left: 25%; }
    .moon-crater:nth-child(3) { width: 10%; height: 10%; top: 35%; left: 70%; }

    /* Galaxy story text overlay */
    .galaxy-story-wrap {
      position: relative;
      z-index: 5;
      max-width: min(600px, 90vw);
      text-align: center;
      margin: auto;
      padding: 0 20px;
    }

    .galaxy-story-line {
      font-family: var(--font-serif);
      font-size: clamp(16px, 3.5vw, 28px);
      font-weight: 300;
      font-style: italic;
      color: rgba(255,255,255,0.0);
      line-height: 1.7;
      margin: 0;
      text-shadow: 0 0 30px rgba(255,255,255,0.3);
    }

    .galaxy-story-line.visible {
      color: rgba(255,255,255,0.9);
      transition: color 1.5s ease;
    }

    .galaxy-story-line.gold {
      color: rgba(245,200,66,0.0);
      font-size: clamp(20px, 4.5vw, 36px);
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .galaxy-story-line.gold.visible {
      color: rgba(245,200,66,1);
      text-shadow: 0 0 40px rgba(212,160,23,0.6);
    }

    .galaxy-typed-cursor {
      font-family: var(--font-serif);
      color: var(--gold-bright);
      font-size: inherit;
      animation: blinkCursor 0.8s ease-in-out infinite;
    }

    @keyframes blinkCursor {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ═══════════════════════════════════════════════════════════
       SCENE 4 — FLOWER BLOOM
    ═══════════════════════════════════════════════════════════ */
    #scene-flower {
      background: radial-gradient(ellipse at bottom, #0d0521 0%, #030010 60%, #000 100%);
      overflow: hidden;
    }

    #flower-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .flower-ground {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(107,33,168,0.4) 30%, rgba(212,160,23,0.3) 50%, rgba(107,33,168,0.4) 70%, transparent);
    }

    /* SVG flower container */
    .flower-svg-wrap {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
    }

    .flower-svg {
      width: clamp(160px, 30vw, 260px);
      height: clamp(200px, 40vh, 360px);
      overflow: visible;
    }

    /* The name reveal below the flower */
    .flower-name-wrap {
      position: absolute;
      bottom: clamp(30px, 6vh, 60px);
      width: 100%;
      text-align: center;
      z-index: 5;
    }

    .flower-name {
      font-family: var(--font-display);
      font-size: clamp(32px, 8vw, 72px);
      font-weight: 700;
      font-style: italic;
      color: transparent;
      background: linear-gradient(135deg, var(--gold-pale) 0%, var(--gold-bright) 40%, var(--gold) 60%, var(--gold-pale) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      letter-spacing: 0.06em;
      text-shadow: none;
      filter: drop-shadow(0 0 30px rgba(212,160,23,0.5));
      opacity: 0;
      transform: translateY(20px);
      animation: nameReveal 2s ease forwards;
      animation-play-state: paused;
    }

    .flower-name.animate {
      animation-play-state: running;
    }

    @keyframes nameReveal {
      0%   { opacity: 0; transform: translateY(20px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .flower-name-subtitle {
      font-family: var(--font-sans);
      font-size: clamp(10px, 1.8vw, 14px);
      font-weight: 300;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(212,160,23,0.55);
      margin-top: 8px;
      opacity: 0;
